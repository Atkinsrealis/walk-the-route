<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Walk the Route</title>

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
    rel="stylesheet"
  />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background: #0a0f1f;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 18px 16px 24px;
      color: white;
      background: linear-gradient(
        to bottom,
        rgba(5, 10, 22, 0.88),
        rgba(5, 10, 22, 0)
      );
    }

    .topbar h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .topbar p {
      margin: 6px 0 0;
      opacity: 0.72;
      font-size: 14px;
    }

    .warning {
      position: absolute;
      top: 88px;
      left: 16px;
      right: 16px;
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      z-index: 20;
      display: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      font-size: 14px;
      font-weight: 600;
    }

    .warning.safe {
      background: rgba(17, 170, 98, 0.92);
    }

    .warning.warning {
      background: rgba(245, 185, 32, 0.94);
      color: #15202b;
    }

    .warning.alert {
      background: rgba(232, 70, 70, 0.95);
    }

    .route-card {
      position: absolute;
      top: 142px;
      left: 16px;
      right: 16px;
      z-index: 19;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(10, 15, 31, 0.78);
      color: white;
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .route-card__main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .route-card__text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .route-card__label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.68;
    }

    .route-card__value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .route-card__meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
    }

    .route-card__source {
      font-size: 11px;
      opacity: 0.58;
    }

    .route-card__badge {
      flex-shrink: 0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(17, 170, 98, 0.18);
      color: #7ef0b3;
      white-space: nowrap;
    }

    .route-card__badge.warning {
      background: rgba(245, 185, 32, 0.18);
      color: #ffd86a;
    }

    .route-card__badge.alert {
      background: rgba(232, 70, 70, 0.18);
      color: #ff9d9d;
    }

    .bottom-panel {
      position: absolute;
      bottom: 18px;
      left: 16px;
      right: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      z-index: 10;
      max-width: 640px;
      margin: 0 auto;
    }

    .route-center-button {
      position: absolute;
      right: 16px;
      bottom: 96px;
      z-index: 12;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 999px;
      background: rgba(10, 15, 31, 0.88);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      cursor: pointer;
    }

    .card {
      background: linear-gradient(180deg, rgba(16, 22, 40, 0.92), rgba(8, 11, 21, 0.92));
      color: white;
      padding: 14px 10px;
      border-radius: 16px;
      text-align: center;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 10px 24px rgba(0, 0, 0, 0.22);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      min-width: 0;
    }

    .card strong {
      display: block;
      font-size: 16px;
      margin-top: 4px;
    }

    .mapboxgl-ctrl-logo,
    .mapboxgl-ctrl-group,
    .mapboxgl-ctrl {
      display: none !important;
    }

    @media (max-width: 480px) {
      .topbar {
        padding: 16px 12px 22px;
      }

      .topbar h1 {
        font-size: 22px;
      }

      .topbar p {
        font-size: 13px;
      }

      .warning {
        top: 82px;
        left: 12px;
        right: 12px;
        padding: 11px 12px;
        font-size: 13px;
      }

      .route-card {
        top: 132px;
        left: 12px;
        right: 12px;
        padding: 11px 12px;
        align-items: flex-start;
      }

      .route-card__value {
        font-size: 18px;
      }

      .route-card__meta {
        font-size: 11px;
      }

      .bottom-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        gap: 8px;
      }

      .card {
        padding: 12px 8px;
        font-size: 12px;
      }

      .card strong {
        font-size: 14px;
      }
    }

    @media (max-width: 360px) {
      .route-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .route-card__badge {
        width: 100%;
        text-align: center;
      }

      .bottom-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>Walk the Route</h1>
  <p>Heathrow Charity Event</p>
</div>

<div class="warning" id="warning">
  ⚠️ You may be off the official route
</div>

<div class="route-card" id="route-card">
  <div class="route-card__main">
    <div class="route-card__text">
      <span class="route-card__label">Route progress</span>
      <span class="route-card__value" id="progress-value">0%</span>
    </div>
    <div class="route-card__meta">
      <span id="distance-value">0 m from route</span>
      <span class="route-card__source">Route source: Heathrow perimeter</span>
    </div>
  </div>
  <span class="route-card__badge" id="route-badge">On route</span>
</div>

<button class="route-center-button" id="route-center-button" aria-label="Center on route">↺</button>
<div id="map"></div>

<div class="bottom-panel">
  <div class="card"><strong>Hazards</strong></div>
  <div class="card"><strong>Rest</strong></div>
  <div class="card"><strong>Safety</strong></div>
</div>

<script>
  mapboxgl.accessToken =
    'pk.eyJ1IjoicmljaGFyZC1iYWlsZXkyIiwiYSI6ImNtcXBiYzh6ejA0dGoyc3FxYmg5YXFxMWQifQ.zHEWJan_S5xHS62DsK_SyQ';

  const routeGeoJsonUrl = 'heathrow-perimeter-route.geojson';
  const fallbackRouteCoordinates = [
    [-0.4543, 51.4700],
    [-0.4552, 51.4706],
    [-0.4561, 51.4712],
    [-0.4573, 51.4719],
    [-0.4588, 51.4724],
    [-0.4600, 51.4729],
    [-0.4614, 51.4736],
    [-0.4629, 51.4742],
    [-0.4645, 51.4748],
    [-0.4661, 51.4751],
    [-0.4676, 51.4754],
    [-0.4690, 51.4753],
    [-0.4700, 51.4750]
  ];
  let routeCoordinates = [];

  const ROUTE_WARNING_DISTANCE = 300;
  const ROUTE_ALERT_DISTANCE = 600;
  const WARNING_UPDATE_INTERVAL = 3000;
  const VIEW_UPDATE_DISTANCE = 25;
  const MIN_SPEED_FOR_FOLLOW = 0.4;
  const POSITION_UPDATE_MIN_METERS = 12;
  const POSITION_UPDATE_MIN_MS = 8000;
  const START_APPROACH_DISTANCE = 5;
  const FINISH_APPROACH_DISTANCE = 30;
  const WARNING_ID = 'warning';
  const DISTANCE_VALUE_ID = 'distance-value';
  const PROGRESS_VALUE_ID = 'progress-value';
  const ROUTE_BADGE_ID = 'route-badge';
  const ROUTE_CENTER_BUTTON_ID = 'route-center-button';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-0.4543, 51.4700],
    zoom: 13.5,
    pitch: 0,
    bearing: 0,
    attributionControl: false
  });

  let userMarker;
  let hasInitialPosition = false;
  let lastWarningUpdate = 0;
  let lastWarningState = '';
  let lastViewCenter = null;
  let lastPosition = null;
  let lastPositionTime = 0;
  let lastProcessedPosition = null;
  let lastProcessedPositionTime = 0;

  function toRadians(value) {
    return value * (Math.PI / 180);
  }

  function setInitialMapView() {
    if (routeCoordinates.length > 0) {
      const firstPoint = routeCoordinates[0];
      map.setCenter(firstPoint);
      map.setZoom(13.5);
    }
  }

  function centerMapOnRoute() {
    if (routeCoordinates.length === 0) {
      return;
    }

    const bounds = routeCoordinates.reduce((acc, point) => {
      acc = acc || [point[0], point[1], point[0], point[1]];
      acc[0] = Math.min(acc[0], point[0]);
      acc[1] = Math.min(acc[1], point[1]);
      acc[2] = Math.max(acc[2], point[0]);
      acc[3] = Math.max(acc[3], point[1]);
      return acc;
    }, null);

    if (bounds) {
      map.fitBounds(
        [[bounds[0], bounds[1]], [bounds[2], bounds[3]]],
        {
          padding: { top: 120, bottom: 180, left: 40, right: 40 },
          duration: 800
        }
      );
    }
  }

  function haversineDistanceMeters(pointA, pointB) {
    const [lng1, lat1] = pointA;
    const [lng2, lat2] = pointB;

    const earthRadius = 6371000;
    const dLat = toRadians(lat2 - lat1);
    const dLng = toRadians(lng2 - lng1);

    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRadians(lat1)) *
        Math.cos(toRadians(lat2)) *
        Math.sin(dLng / 2) ** 2;

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return earthRadius * c;
  }

  function getDistanceToRoute(userPoint) {
    let minDistance = Number.POSITIVE_INFINITY;

    for (let i = 0; i < routeCoordinates.length - 1; i += 1) {
      const start = routeCoordinates[i];
      const end = routeCoordinates[i + 1];

      const startToUser = haversineDistanceMeters(userPoint, start);
      const endToUser = haversineDistanceMeters(userPoint, end);
      const segmentLength = haversineDistanceMeters(start, end);

      if (segmentLength === 0) {
        minDistance = Math.min(minDistance, startToUser);
        continue;
      }

      const lat1 = toRadians(start[1]);
      const lat2 = toRadians(end[1]);
      const lng1 = toRadians(start[0]);
      const lng2 = toRadians(end[0]);
      const latU = toRadians(userPoint[1]);
      const lngU = toRadians(userPoint[0]);

      const dLng = lng2 - lng1;
      const dLat = lat2 - lat1;
      const dLngU = lngU - lng1;
      const dLatU = latU - lat1;

      const projection =
        (dLngU * dLng + dLatU * dLat) /
        (dLng * dLng + dLat * dLat);

      const clampedProjection = Math.max(0, Math.min(1, projection));
      const closestLng = start[0] + clampedProjection * (end[0] - start[0]);
      const closestLat = start[1] + clampedProjection * (end[1] - start[1]);
      const distanceToSegment = haversineDistanceMeters(userPoint, [closestLng, closestLat]);

      minDistance = Math.min(minDistance, distanceToSegment, startToUser, endToUser);
    }

    return minDistance;
  }

  function showWarning(message, level = '') {
    const warning = document.getElementById(WARNING_ID);
    warning.textContent = message;
    warning.className = `warning ${level}`.trim();
    warning.style.display = message ? 'block' : 'none';
  }

  function formatDistance(distance) {
    if (distance >= 1000) {
      return `${(distance / 1000).toFixed(1)} km`;
    }
    return `${Math.round(distance)} m`;
  }

  function getRouteProgress(userPoint) {
    if (routeCoordinates.length < 2) {
      return 0;
    }

    let totalLength = 0;
    const segmentData = [];

    for (let i = 0; i < routeCoordinates.length - 1; i += 1) {
      const start = routeCoordinates[i];
      const end = routeCoordinates[i + 1];
      const segmentLength = haversineDistanceMeters(start, end);
      segmentData.push({ start, end, segmentLength });
      totalLength += segmentLength;
    }

    if (totalLength === 0) {
      return 0;
    }

    let bestDistance = Number.POSITIVE_INFINITY;
    let bestProgress = 0;
    let runningLength = 0;

    for (const segment of segmentData) {
      const { start, end, segmentLength } = segment;
      const lat1 = toRadians(start[1]);
      const lat2 = toRadians(end[1]);
      const lng1 = toRadians(start[0]);
      const lng2 = toRadians(end[0]);
      const latU = toRadians(userPoint[1]);
      const lngU = toRadians(userPoint[0]);

      const dLng = lng2 - lng1;
      const dLat = lat2 - lat1;
      const dLngU = lngU - lng1;
      const dLatU = latU - lat1;

      const denominator = dLng * dLng + dLat * dLat;

      if (denominator === 0) {
        const pointDistance = haversineDistanceMeters(userPoint, start);
        if (pointDistance < bestDistance) {
          bestDistance = pointDistance;
          bestProgress = runningLength;
        }
        runningLength += segmentLength;
        continue;
      }

      const projection = (dLngU * dLng + dLatU * dLat) / denominator;
      const clampedProjection = Math.max(0, Math.min(1, projection));

      const closestLng = start[0] + clampedProjection * (end[0] - start[0]);
      const closestLat = start[1] + clampedProjection * (end[1] - start[1]);
      const pointDistance = haversineDistanceMeters(userPoint, [closestLng, closestLat]);
      const candidateProgress = runningLength + segmentLength * clampedProjection;

      if (pointDistance < bestDistance) {
        bestDistance = pointDistance;
        bestProgress = candidateProgress;
      }

      runningLength += segmentLength;
    }

    const progress = (bestProgress / totalLength) * 100;
    const distanceToStart = haversineDistanceMeters(userPoint, routeCoordinates[0]);

    if (distanceToStart > START_APPROACH_DISTANCE) {
      return 0;
    }

    if (progress >= 99 && bestDistance > FINISH_APPROACH_DISTANCE) {
      return 99;
    }

    return Math.min(100, Math.max(0, progress));
  }

  function updateDistanceDisplay(distance, progress) {
    const distanceValue = document.getElementById(DISTANCE_VALUE_ID);
    const progressValue = document.getElementById(PROGRESS_VALUE_ID);
    const routeBadge = document.getElementById(ROUTE_BADGE_ID);
    const hasValidDistance = Number.isFinite(distance);
    const normalizedDistance = hasValidDistance ? Math.max(0, distance) : null;
    const displayProgress =
      progress >= 99 && normalizedDistance !== null && normalizedDistance > FINISH_APPROACH_DISTANCE
        ? 99
        : progress;

    if (!hasValidDistance || normalizedDistance === null) {
      progressValue.textContent = '0%';
      distanceValue.textContent = 'Calculating route…';
      routeBadge.textContent = 'Preparing';
      routeBadge.className = 'route-card__badge';
      return;
    }

    const safeProgress = Math.min(100, Math.max(0, displayProgress));

    progressValue.textContent = `${Math.round(safeProgress)}%`;
    distanceValue.textContent = `${formatDistance(normalizedDistance)} from route`;

    if (normalizedDistance > ROUTE_ALERT_DISTANCE) {
      routeBadge.textContent = 'Far off route';
      routeBadge.className = 'route-card__badge alert';
    } else if (normalizedDistance > ROUTE_WARNING_DISTANCE) {
      routeBadge.textContent = 'Near edge';
      routeBadge.className = 'route-card__badge warning';
    } else {
      routeBadge.textContent = 'On route';
      routeBadge.className = 'route-card__badge';
    }
  }

  function updateWarningState(distanceToRoute) {
    const now = Date.now();
    let nextState = '';
    let nextLevel = '';

    if (distanceToRoute > ROUTE_ALERT_DISTANCE) {
      nextState = 'You are far from the official route';
      nextLevel = 'alert';
    } else if (distanceToRoute > ROUTE_WARNING_DISTANCE) {
      nextState = 'You may be off the official route';
      nextLevel = 'warning';
    } else {
      nextState = 'You are staying on the route';
      nextLevel = 'safe';
    }

    if (
      now - lastWarningUpdate >= WARNING_UPDATE_INTERVAL ||
      nextLevel !== lastWarningState
    ) {
      showWarning(nextState, nextLevel);
      lastWarningUpdate = now;
      lastWarningState = nextLevel;
    }
  }

  function updateUserMarker(lng, lat) {
    if (!userMarker) {
      userMarker = new mapboxgl.Marker({
        color: '#00AEEF'
      })
        .setLngLat([lng, lat])
        .addTo(map);
    } else {
      userMarker.setLngLat([lng, lat]);
    }
  }

  function updateMapView(lng, lat) {
    const newCenter = [lng, lat];
    const now = Date.now();

    if (!hasInitialPosition) {
      map.flyTo({
        center: newCenter,
        speed: 0.8,
        zoom: 16
      });
      hasInitialPosition = true;
      lastViewCenter = newCenter;
      lastPosition = newCenter;
      lastPositionTime = now;
      return;
    }

    if (!lastViewCenter) {
      lastViewCenter = newCenter;
      return;
    }

    const distanceMoved = haversineDistanceMeters(lastViewCenter, newCenter);

    if (lastPosition && lastPositionTime) {
      const elapsed = Math.max(1, now - lastPositionTime);
      const speedMps = haversineDistanceMeters(lastPosition, newCenter) / (elapsed / 1000);

      if (speedMps < MIN_SPEED_FOR_FOLLOW && distanceMoved < VIEW_UPDATE_DISTANCE) {
        lastPosition = newCenter;
        lastPositionTime = now;
        return;
      }
    }

    if (distanceMoved >= VIEW_UPDATE_DISTANCE) {
      map.easeTo({
        center: newCenter,
        duration: 1000
      });
      lastViewCenter = newCenter;
    }

    lastPosition = newCenter;
    lastPositionTime = now;
  }

  function shouldProcessLocationUpdate(lng, lat) {
    const now = Date.now();

    if (!lastProcessedPosition) {
      lastProcessedPosition = [lng, lat];
      lastProcessedPositionTime = now;
      return true;
    }

    const moved = haversineDistanceMeters(lastProcessedPosition, [lng, lat]);
    const elapsed = now - lastProcessedPositionTime;

    if (moved >= POSITION_UPDATE_MIN_METERS || elapsed >= POSITION_UPDATE_MIN_MS) {
      lastProcessedPosition = [lng, lat];
      lastProcessedPositionTime = now;
      return true;
    }

    return false;
  }

  function buildRouteFeatureFromCoordinates(coordinates) {
    return {
      type: 'Feature',
      properties: {},
      geometry: {
        type: 'LineString',
        coordinates
      }
    };
  }

  function addRouteToMap(routeFeature) {
    routeCoordinates = routeFeature.geometry.coordinates;

    if (!map.getSource('route')) {
      map.addSource('route', {
        type: 'geojson',
        data: routeFeature
      });

      map.addLayer({
        id: 'route-shadow',
        type: 'line',
        source: 'route',
        paint: {
          'line-color': '#0b1223',
          'line-width': 8,
          'line-opacity': 0.45
        }
      });

      map.addLayer({
        id: 'route-dotted-ahead',
        type: 'line',
        source: 'route',
        paint: {
          'line-color': '#8b5cf6',
          'line-width': 2,
          'line-dasharray': [0, 1.5, 0.8, 1.5],
          'line-opacity': 0.75
        }
      });

      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        paint: {
          'line-color': '#7c3aed',
          'line-width': 3.5,
          'line-opacity': 0.95
        }
      });
    } else {
      map.getSource('route').setData(routeFeature);
    }

    setInitialMapView();

    if (routeCoordinates.length > 0) {
      new mapboxgl.Marker({ color: '#22c55e' })
        .setLngLat(routeCoordinates[0])
        .setPopup(
          new mapboxgl.Popup().setHTML(
            '<h3>Start</h3><p>Route begins here</p>'
          )
        )
        .addTo(map);

      new mapboxgl.Marker({ color: '#f97316' })
        .setLngLat(routeCoordinates[routeCoordinates.length - 1])
        .setPopup(
          new mapboxgl.Popup().setHTML(
            '<h3>Finish</h3><p>End of route</p>'
          )
        )
        .addTo(map);
    }
  }

  function loadRouteGeoJson() {
    if (window.location.protocol === 'file:') {
      addRouteToMap(buildRouteFeatureFromCoordinates(fallbackRouteCoordinates));
      showWarning(
        '🗺️ Open this page from a web server to load the exact route file',
        'warning'
      );
      return;
    }

    fetch(routeGeoJsonUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to load route geojson: ${response.status}`);
        }
        return response.json();
      })
      .then(geojson => {
        let routeFeature = geojson;

        if (geojson && geojson.type === 'FeatureCollection' && Array.isArray(geojson.features)) {
          routeFeature = geojson.features.find(
            feature => feature && feature.geometry && feature.geometry.type === 'LineString'
          ) || geojson.features[0];
        }

        if (routeFeature && routeFeature.type === 'FeatureCollection') {
          routeFeature = routeFeature.features.find(
            feature => feature && feature.geometry && feature.geometry.type === 'LineString'
          ) || routeFeature.features[0];
        }

        const geometry = routeFeature && routeFeature.geometry;

        if (!geometry || geometry.type !== 'LineString' || !Array.isArray(geometry.coordinates)) {
          throw new Error('GeoJSON must contain a LineString geometry.');
        }

        addRouteToMap(routeFeature);
      })
      .catch(error => {
        console.error(error);
        addRouteToMap(buildRouteFeatureFromCoordinates(fallbackRouteCoordinates));
        showWarning('🗺️ Using fallback route preview', 'warning');
      });
  }

  document.getElementById(ROUTE_CENTER_BUTTON_ID).addEventListener('click', centerMapOnRoute);

  map.on('load', () => {
    loadRouteGeoJson();
  });

  navigator.geolocation.watchPosition(
    position => {
      const lng = position.coords.longitude;
      const lat = position.coords.latitude;

      if (!shouldProcessLocationUpdate(lng, lat)) {
        return;
      }

      updateUserMarker(lng, lat);
      updateMapView(lng, lat);

      const userPoint = [lng, lat];
      const distanceToRoute = getDistanceToRoute(userPoint);
      const routeProgress = getRouteProgress(userPoint);
      updateDistanceDisplay(distanceToRoute, routeProgress);
      updateWarningState(distanceToRoute);
    },
    () => {
      showWarning('📍 Location access is unavailable or blocked', 'alert');
    },
    {
      enableHighAccuracy: false,
      maximumAge: 20000,
      timeout: 30000
    }
  );
</script>
