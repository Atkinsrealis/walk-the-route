<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Walk the Route</title>

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
    rel="stylesheet"
  />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #000;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      z-index: 10;

      padding: 16px;

      color: white;

      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.9),
        rgba(0,0,0,0)
      );
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

    .topbar p {
      margin-top: 4px;
      opacity: 0.7;
    }

    .warning {
      position: absolute;
      top: 90px;
      left: 16px;
      right: 16px;

      background: rgba(255,80,80,0.95);

      color: white;

      padding: 14px;
      border-radius: 12px;

      z-index: 20;

      display: none;
    }

    .bottom-panel {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;

      display: flex;
      gap: 10px;

      z-index: 10;
    }

    .card {
      flex: 1;

      background: rgba(0,0,0,0.75);

      color: white;

      padding: 14px;

      border-radius: 14px;

      text-align: center;

      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>Walk the Route</h1>
  <p>Heathrow Charity Event</p>
</div>

<div class="warning" id="warning">
  ⚠️ You may be off the official route
</div>

<div id="map"></div>

<div class="bottom-panel">
  <div class="card">⚠️ Hazards</div>
  <div class="card">☕ Rest Stops</div>
  <div class="card">🛡️ Safety</div>
</div>

<script>
  mapboxgl.accessToken =
    'pk.eyJ1IjoicmljaGFyZC1iYWlsZXkyIiwiYSI6ImNtcXBiYzh6ejA0dGoyc3FxYmg5YXFxMWQifQ.zHEWJan_S5xHS62DsK_SyQ';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-0.4543, 51.4700],
    zoom: 13.5,
    pitch: 45,
    bearing: -17
  });

  map.addControl(new mapboxgl.NavigationControl());

  map.on('load', () => {

    // ROUTE
    map.addSource('route', {
      type: 'geojson',
      data: {
        type: 'Feature',
        geometry: {
          type: 'LineString',
          coordinates: [
            [-0.4543, 51.4700],
            [-0.4600, 51.4720],
            [-0.4700, 51.4750]
          ]
        }
      }
    });

    map.addLayer({
      id: 'route-line',
      type: 'line',
      source: 'route',
      paint: {
        'line-color': '#00FF99',
        'line-width': 8
      }
    });

    // HAZARD POINT
    new mapboxgl.Marker({ color: 'red' })
      .setLngLat([-0.4600, 51.4720])
      .setPopup(
        new mapboxgl.Popup().setHTML(
          '<h3>No Pavement</h3><p>Walk single file</p>'
        )
      )
      .addTo(map);

    // REST STOP
    new mapboxgl.Marker({ color: 'blue' })
      .setLngLat([-0.4700, 51.4750])
      .setPopup(
        new mapboxgl.Popup().setHTML(
          '<h3>Rest Area</h3><p>Water + Toilets</p>'
        )
      )
      .addTo(map);
  });

  // LIVE GPS

  let userMarker;

  navigator.geolocation.watchPosition(position => {

    const lng = position.coords.longitude;
    const lat = position.coords.latitude;

    if (!userMarker) {
      userMarker = new mapboxgl.Marker({
        color: '#00AEEF'
      })
        .setLngLat([lng, lat])
        .addTo(map);

    } else {
      userMarker.setLngLat([lng, lat]);
    }

    map.flyTo({
      center: [lng, lat],
      speed: 0.8
    });

    // SIMPLE WARNING

    const distance =
      Math.sqrt(
        Math.pow(lng + 0.4543, 2) +
        Math.pow(lat - 51.4700, 2)
      ) * 111000;

    const warning = document.getElementById('warning');

    if (distance > 300) {
      warning.style.display = 'block';
    } else {
      warning.style.display = 'none';
    }

  });
</script>

</body>
</html>
