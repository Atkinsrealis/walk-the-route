<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface Tool (Final)</title>

<style>
body {
  font-family: system-ui;
  background:#0a0f1f;
  color:white;
  padding:24px;
  max-width:760px;
  margin:auto;
}
button {
  background:#7c3aed;
  color:white;
  padding:10px;
  border-radius:8px;
  border:0;
}
</style>
</head>

<body>

<h1>Surface Tool</h1>

<input type="file" id="file"><br><br>
<button id="run">Analyse</button>

<pre id="output"></pre>

<script>

const OVERPASS = "https://overpass.kumi.systems/api/interpreter";
const SEARCH_BUFFER = 50;
const MIN_SEGMENT = 10;

const COLORS = {
  paved:"#22c55e",
  unpaved:"#f59e0b",
  unknown:"#ef4444",
  route:"#7c3aed"
};

function log(m){
  document.getElementById("output").textContent+=m+"\n";
}

function rad(v){ return v*Math.PI/180 }

function dist(a,b){
  const R=6371000;
  const dLat=rad(b[1]-a[1]);
  const dLng=rad(b[0]-a[0]);
  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(rad(a[1]))*Math.cos(rad(b[1]))*
    Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function extractLines(g){
  const lines=[];
  const add=x=>{
    if(!x) return;
    if(x.type==="LineString") lines.push(x.coordinates);
    if(x.type==="MultiLineString") x.coordinates.forEach(l=>lines.push(l));
  };
  if(g.type==="FeatureCollection") g.features.forEach(f=>add(f.geometry));
  add(g);
  return lines;
}

function classify(tags){
  const s=tags.surface?.toLowerCase();
  if(s?.includes("asphalt")||s==="paved") return "paved";
  if(s==="gravel"||s==="dirt") return "unpaved";
  return "unknown";
}

async function fetchOSM(bbox){

  const q=`[out:json][timeout:40];
  (way(${bbox.s},${bbox.w},${bbox.n},${bbox.e}););
  out tags geom;`;

  const res=await fetch(OVERPASS,{
    method:"POST",
    body:"data="+encodeURIComponent(q)
  });

  const data=await res.json();

  return data.elements.filter(e=>e.geometry).map(e=>({
    coords:e.geometry.map(p=>[p.lon,p.lat]),
    tags:e.tags||{}
  }));
}

document.getElementById("run").onclick=async()=>{

  const f=document.getElementById("file").files[0];
  if(!f) return;

  const geo=JSON.parse(await f.text());
  const lines=extractLines(geo);

  const flat=lines.flat();
  const bbox={
    w:Math.min(...flat.map(c=>c[0])),
    e:Math.max(...flat.map(c=>c[0])),
    s:Math.min(...flat.map(c=>c[1])),
    n:Math.max(...flat.map(c=>c[1]))
  };

  const ways=await fetchOSM(bbox);

  const features=[];

  // ✅ PER LINE PROCESSING
  for(const line of lines){

    const segments=[];
    for(let i=0;i<line.length-1;i++){
      segments.push([line[i],line[i+1]]);
    }

    // ✅ classify
    const classified=[];

    for(const seg of segments){

      const len=dist(seg[0],seg[1]);

      let best=Infinity;
      let near=null;

      for(const w of ways){
        for(let i=0;i<w.coords.length-1;i++){
          const d=dist(seg[0],w.coords[i]);
          if(d<best){
            best=d;
            near=w;
          }
        }
      }

      let type="unknown";
      if(near && best<SEARCH_BUFFER){
        type=classify(near.tags);
      }

      classified.push({
        type,
        coords:seg,
        length:len
      });
    }

    // ✅ SAFE SMOOTH
    const smoothed=[];

    for(let i=0;i<classified.length;i++){

      const seg=classified[i];

      if(seg.length < MIN_SEGMENT && smoothed.length){

        const prev=smoothed[smoothed.length-1];

        const gap=dist(
          prev.coords[prev.coords.length-1],
          seg.coords[0]
        );

        if(gap < 30){
          // ✅ EXTEND safely
          prev.coords.push(seg.coords[1]);
          continue;
        }
      }

      smoothed.push({
        type:seg.type,
        coords:[...seg.coords]
      });
    }

    // ✅ SAFE MERGE
    const merged=[];
    let current=null;

    for(const seg of smoothed){

      if(!current){
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      const gap=dist(
        current.coords[current.coords.length-1],
        seg.coords[0]
      );

      // ✅ HARD BREAK if geometry jumps
      if(gap > 50){
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      if(current.type===seg.type){
        current.coords.push(seg.coords[1]);
      } else {
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
      }
    }

    if(current) merged.push(current);

    // ✅ DRAW ORIGINAL (purple)
    features.push({
      type:"Feature",
      properties:{stroke:COLORS.route,"stroke-width":4},
      geometry:{type:"LineString",coordinates:line}
    });

    // ✅ DRAW SURFACE
    for(const seg of merged){
      features.push({
        type:"Feature",
        properties:{
          stroke:COLORS[seg.type],
          "stroke-width":5
        },
        geometry:{
          type:"LineString",
          coordinates:seg.coords
        }
      });
    }
  }

  const result={
    type:"FeatureCollection",
    features
  };

  const blob=new Blob([JSON.stringify(result,null,2)]);
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="surface.geojson";
  a.click();
};

</script>
</body>
</html>
