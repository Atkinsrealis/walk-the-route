<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface Debug Tool</title>

<style>
body {
  font-family: system-ui, sans-serif;
  background: #0a0f1f;
  color: white;
  padding: 24px;
  max-width: 760px;
  margin: auto;
}

button {
  background: #7c3aed;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  border: 0;
  font-weight: 700;
  cursor: pointer;
}

button.secondary {
  background: #374151;
}

pre {
  background: #060b18;
  padding: 14px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Surface Debug Tool</h1>

<input type="file" id="file">
<br><br>

<button id="run">Analyse</button>
<button class="secondary" onclick="clearCache()">Clear cache</button>

<pre id="output">Waiting…</pre>

<script>

// ---------- CONFIG ----------
const OVERPASS_ENDPOINTS = [
  "https://overpass.kumi.systems/api/interpreter",
  "https://overpass.openstreetmap.fr/api/interpreter",
  "https://overpass-api.de/api/interpreter"
];

const TIMEOUT_MS = 12000;
const SEARCH_BUFFER = 50;
const BBOX_PAD = 0.0015;

const COLORS = {
  paved:"#22c55e",
  unpaved:"#f59e0b",
  unknown:"#ef4444",
  route:"#7c3aed"
};

const PAVED = new Set(["asphalt","paved","concrete","tarmac"]);
const UNPAVED = new Set(["gravel","dirt","grass","earth"]);

const out = document.getElementById("output");
function log(m){ out.textContent += "\n" + m }

// ---------- CACHE ----------
function getCacheKey(b){
  return "osm_" + [
    b.west.toFixed(3),
    b.south.toFixed(3),
    b.east.toFixed(3),
    b.north.toFixed(3)
  ].join("_");
}

function getDebugKey(lines){
  const hash = lines.flat().slice(0,50).map(c=>c.join(",")).join("|");
  return "debug_" + hash;
}

function getCachedJSON(key){
  try{
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : null;
  } catch {
    return null;
  }
}

function setCachedJSON(key,data){
  try{
    localStorage.setItem(key, JSON.stringify({
      timestamp: Date.now(),
      data
    }));
  } catch {}
}

function clearCache(){
  localStorage.clear();
  location.reload();
}

// ---------- FETCH ----------
function fetchWithTimeout(url, options){
  return Promise.race([
    fetch(url, options),
    new Promise((_,reject)=>
      setTimeout(()=>reject(new Error("timeout")), TIMEOUT_MS)
    )
  ]);
}

// ---------- GEO ----------
function rad(v){ return v*Math.PI/180 }

function dist(a,b){
  const R=6371000;
  const dLat=rad(b[1]-a[1]);
  const dLng=rad(b[0]-a[0]);

  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(rad(a[1]))*
    Math.cos(rad(b[1]))*
    Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function segDist(p,a,b){
  const t=Math.max(0,Math.min(1,
    ((p[0]-a[0])*(b[0]-a[0])+(p[1]-a[1])*(b[1]-a[1])) /
    ((b[0]-a[0])**2+(b[1]-a[1])**2)
  ));
  return dist(p,[a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1])]);
}

function wayDist(seg,coords){
  const mid=[
    (seg[0][0]+seg[1][0])/2,
    (seg[0][1]+seg[1][1])/2
  ];

  let best=Infinity;

  for(let i=0;i<coords.length-1;i++){
    const d=segDist(mid,coords[i],coords[i+1]);
    if(d<best) best=d;
  }

  return best;
}

// ---------- ROUTE ----------
function extractLines(g){
  const lines=[];
  const add=x=>{
    if(!x) return;
    if(x.type==="LineString") lines.push(x.coordinates);
    if(x.type==="MultiLineString") x.coordinates.forEach(l=>lines.push(l));
  };

  if(g.type==="FeatureCollection") g.features.forEach(f=>add(f.geometry));
  if(g.type==="Feature") add(g.geometry);
  add(g);

  return lines;
}

function split(lines){
  return lines.flatMap(l=>{
    const segs=[];
    for(let i=0;i<l.length-1;i++){
      segs.push([l[i],l[i+1]]);
    }
    return segs;
  });
}

function bbox(lines){
  const c=lines.flat();
  return {
    west: Math.min(...c.map(x=>x[0]))-BBOX_PAD,
    east: Math.max(...c.map(x=>x[0]))+BBOX_PAD,
    south: Math.min(...c.map(x=>x[1]))-BBOX_PAD,
    north: Math.max(...c.map(x=>x[1]))+BBOX_PAD
  };
}

// ---------- FETCH OSM ----------
async function fetchOSM(b){
  const key = getCacheKey(b);

  const cached = getCachedJSON(key);
  if(cached){
    log("⚡ Using cached OSM data");
    return cached.data;
  }

  const query=`
[out:json][timeout:45];
(way(${b.south},${b.west},${b.north},${b.east}););
out tags geom;
`;

  for(const url of OVERPASS_ENDPOINTS){
    try{
      log("🌐 Trying: " + url);

      const res = await fetchWithTimeout(url,{
        method:"POST",
        body:"data="+encodeURIComponent(query),
        headers:{
          "Content-Type":"application/x-www-form-urlencoded"
        }
      });

      if(!res.ok) continue;

      const data=await res.json();

      const ways=data.elements
        .filter(e=>e.geometry)
        .map(e=>({
          tags:e.tags||{},
          coords:e.geometry.map(p=>[p.lon,p.lat])
        }));

      setCachedJSON(key, ways);

      return ways;

    }catch(e){
      log("❌ Failed ("+e.message+")");
    }
  }

  throw new Error("All endpoints failed");
}

// ---------- CLASSIFY ----------
function classify(tags){
  const s=tags.surface?.toLowerCase();
  if(s){
    if(PAVED.has(s)) return "paved";
    if(UNPAVED.has(s)) return "unpaved";
  }
  return "unknown";
}

// ---------- DOWNLOAD ----------
function download(name,data){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name;
  a.click();
  URL.revokeObjectURL(url);
}

// ---------- MAIN ----------
document.getElementById("run").onclick=async()=>{
  out.textContent="";

  try{
    const file=document.getElementById("file").files[0];
    if(!file){
      log("Pick file first");
      return;
    }

    log("Reading...");
    const geo=JSON.parse(await file.text());

    const lines=extractLines(geo);

    const debugKey=getDebugKey(lines);
    const cachedDebug=getCachedJSON(debugKey);

    if(cachedDebug){
      log("⚡ Using cached debug result");

      log(JSON.stringify(cachedDebug.data.summary,null,2));

      download("surface-debug.geojson",cachedDebug.data.geojson);

      return;
    }

    const segs=split(lines);
    const ways=await fetchOSM(bbox(lines));

    let totals={paved:0,unpaved:0,unknown:0};
    const features=[];

    lines.forEach(line=>{
      features.push({
        type:"Feature",
        properties:{stroke:COLORS.route,"stroke-width":4},
        geometry:{type:"LineString",coordinates:line}
      });
    });

    segs.forEach(seg=>{
      const len=dist(seg[0],seg[1]);

      let best=Infinity,nearest=null;

      ways.forEach(w=>{
        const d=wayDist(seg,w.coords);
        if(d<best){
          best=d;
          nearest=w;
        }
      });

      let type="unknown";
      if(nearest && best<=SEARCH_BUFFER){
        type=classify(nearest.tags);
      }

      totals[type]+=len;

      features.push({
        type:"Feature",
        properties:{
          stroke:COLORS[type],
          "stroke-width":3
        },
        geometry:{
          type:"LineString",
          coordinates:seg
        }
      });
    });

    const total=totals.paved+totals.unpaved+totals.unknown;

    const summary={
      pavedPercent:Math.round((totals.paved/total)*100),
      unpavedPercent:Math.round((totals.unpaved/total)*100),
      unknownPercent:Math.round((totals.unknown/total)*100)
    };

    log(JSON.stringify(summary,null,2));

    const debugResult={
      summary,
      geojson:{
        type:"FeatureCollection",
        features
      }
    };

    setCachedJSON(debugKey, debugResult);

    download("surface-debug.geojson", debugResult.geojson);

  }catch(e){
    log("❌ "+e.message);
  }
};

</script>

</body>
</html>
