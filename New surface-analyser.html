<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface Tool Final Stable</title>

<style>
body {
  font-family: system-ui;
  background:#0a0f1f;
  color:white;
  padding:24px;
  max-width:760px;
  margin:auto;
}
button {
  background:#7c3aed;
  color:white;
  padding:10px;
  border-radius:8px;
  border:0;
}
</style>
</head>

<body>

<h1>Surface Tool</h1>

<input type="file" id="file"><br><br>
<button id="run">Analyse</button>

<pre id="output"></pre>

<script>

const OVERPASS = "https://overpass.kumi.systems/api/interpreter";

const SEARCH_BUFFER = 60; // slightly increased reliability
const MIN_SEGMENT = 10;

const COLORS = {
  paved:"#22c55e",
  unpaved:"#f59e0b",
  unknown:"#ef4444",
  route:"#7c3aed"
};

function log(m){
  document.getElementById("output").textContent+=m+"\n";
}

function rad(v){ return v*Math.PI/180 }

function dist(a,b){
  const R=6371000;
  const dLat=rad(b[1]-a[1]);
  const dLng=rad(b[0]-a[0]);
  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(rad(a[1])) *
    Math.cos(rad(b[1])) *
    Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function extractLines(g){
  const lines=[];
  const add=x=>{
    if(!x) return;
    if(x.type==="LineString") lines.push(x.coordinates);
    if(x.type==="MultiLineString") x.coordinates.forEach(l=>lines.push(l));
  };
  if(g.type==="FeatureCollection") g.features.forEach(f=>add(f.geometry));
  add(g);
  return lines;
}

function classify(tags){
  const s = tags.surface?.toLowerCase();

  if (!s) return "unknown";

  if (["paved","asphalt","concrete","tarmac"].includes(s)) return "paved";
  if (["gravel","dirt","ground","earth"].includes(s)) return "unpaved";

  return "unknown";
}

// ✅ IMPORTANT: midpoint-based distance (correct matching)
function segmentToWayDistance(seg, wayCoords){

  const mid = [
    (seg[0][0] + seg[1][0]) / 2,
    (seg[0][1] + seg[1][1]) / 2
  ];

  let best = Infinity;

  for (let i=0; i<wayCoords.length-1; i++) {

    const d = dist(mid, wayCoords[i]);

    if(d < best) best = d;
  }

  return best;
}

async function fetchOSM(b){

  const q=`[out:json][timeout:40];
  (way(${b.s},${b.w},${b.n},${b.e}););
  out tags geom;`;

  const res = await fetch(OVERPASS,{
    method:"POST",
    body:"data="+encodeURIComponent(q)
  });

  const data = await res.json();

  return data.elements.filter(e=>e.geometry).map(e=>({
    coords:e.geometry.map(p=>[p.lon,p.lat]),
    tags:e.tags || {}
  }));
}

document.getElementById("run").onclick = async () => {

  document.getElementById("output").textContent="";

  const f=document.getElementById("file").files[0];
  if(!f) return;

  const geo=JSON.parse(await f.text());

  const lines=extractLines(geo);

  const flat=lines.flat();

  const bbox={
    w:Math.min(...flat.map(c=>c[0])),
    e:Math.max(...flat.map(c=>c[0])),
    s:Math.min(...flat.map(c=>c[1])),
    n:Math.max(...flat.map(c=>c[1]))
  };

  const ways = await fetchOSM(bbox);

  const features=[];

  // ✅ PROCESS EACH LINE IN ISOLATION
  for(const line of lines){

    const classified=[];

    for(let i=0;i<line.length-1;i++){

      const seg=[line[i],line[i+1]];
      const len=dist(seg[0],seg[1]);

      let best=Infinity;
      let nearest=null;

      for(const w of ways){

        const d = segmentToWayDistance(seg, w.coords);

        if(d < best){
          best = d;
          nearest = w;
        }
      }

      let type="unknown";

      if(nearest && best < SEARCH_BUFFER){
        type = classify(nearest.tags);
      }

      classified.push({
        type,
        coords: seg,
        length: len
      });
    }

    // ✅ SMOOTH (NO OVERWRITE EVER)
    const smoothed=[];

    for(const seg of classified){

      if(seg.length < MIN_SEGMENT && smoothed.length){

        const prev = smoothed[smoothed.length - 1];

        const gap = dist(
          prev.coords[prev.coords.length-1],
          seg.coords[0]
        );

        if(gap < 30){
          prev.coords.push(seg.coords[1]);
          continue;
        }
      }

      smoothed.push({
        type: seg.type,
        coords: [...seg.coords]
      });
    }

    // ✅ MERGE (SAFE)
    const merged=[];
    let current=null;

    for(const seg of smoothed){

      if(!current){
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      const gap = dist(
        current.coords[current.coords.length-1],
        seg.coords[0]
      );

      // ✅ prevents your diagonal bug permanently
      if(gap > 40){
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      if(current.type === seg.type){
        current.coords.push(seg.coords[1]);
      } else {
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
      }
    }

    if(current) merged.push(current);

    // ✅ draw original route
    features.push({
      type:"Feature",
      properties:{stroke:COLORS.route,"stroke-width":4},
      geometry:{type:"LineString",coordinates:line}
    });

    // ✅ draw merged
    for(const seg of merged){
      features.push({
        type:"Feature",
        properties:{
          stroke:COLORS[seg.type],
          "stroke-width":5
        },
        geometry:{
          type:"LineString",
          coordinates:seg.coords
        }
      });
    }
  }

  const result={
    type:"FeatureCollection",
    features
  };

  const blob=new Blob([JSON.stringify(result,null,2)]);
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="surface.geojson";
  a.click();
};

</script>
</body>
</html>
