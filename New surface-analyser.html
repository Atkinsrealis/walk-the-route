<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface Debug Tool</title>

<style>
body {
  font-family: system-ui;
  background:#0a0f1f;
  color:white;
  padding:24px;
  max-width:760px;
  margin:auto;
}

button {
  background:#7c3aed;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  border:0;
  font-weight:700;
}

button:disabled {
  opacity:0.6;
  cursor:not-allowed;
}

button.secondary {
  background:#374151;
}

pre {
  background:#060b18;
  padding:14px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Surface Debug Tool</h1>

<input type="file" id="file"><br><br>
<button id="run">Analyse</button>
<button class="secondary" onclick="clearCache()">Clear cache</button>

<pre id="output">Waiting…</pre>

<script>

// ---------- CONFIG ----------
const OVERPASS_ENDPOINTS = [
  "https://overpass.kumi.systems/api/interpreter",
  "https://overpass.openstreetmap.fr/api/interpreter",
  "https://overpass-api.de/api/interpreter"
];

const TIMEOUT_MS = 12000;
const SEARCH_BUFFER = 35;
const MIN_SEGMENT_LENGTH = 10;
const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const MAX_CACHE_ITEM_BYTES = 900000;
const MAX_ENDPOINT_DISTANCE = 32;
const MAX_BEARING_DIFF_DEGREES = 55;

const COLORS = {
  paved:"#22c55e",
  unpaved:"#f59e0b",
  unknown:"#ef4444",
  route:"#7c3aed"
};

const PAVED = new Set(["asphalt","paved","concrete","tarmac"]);
const UNPAVED = new Set(["gravel","dirt","grass","earth"]);
const WALKABLE_HIGHWAYS = new Set([
  "footway",
  "path",
  "cycleway",
  "bridleway",
  "pedestrian",
  "track",
  "service",
  "residential",
  "living_street",
  "unclassified",
  "tertiary",
]);
const HIGHWAY_SCORE_PENALTY = {
  motorway: 180,
  trunk: 130,
  primary: 90,
  secondary: 60,
  tertiary: 40,
};

const out = document.getElementById("output");
const runButton = document.getElementById("run");

function log(m){
  out.textContent += "\n" + m;
}

// ---------- CACHE ----------
function getCacheKey(b){
  return "osm_" + [
    b.w.toFixed(3),
    b.s.toFixed(3),
    b.e.toFixed(3),
    b.n.toFixed(3)
  ].join("_");
}

function getDebugKey(lines){
  return "debug_" + lines.flat().slice(0,50)
    .map(c=>c.join(",")).join("|");
}

function getCached(key){
  try {
    const raw = localStorage.getItem(key);
    if (!raw) {
      return null;
    }

    const parsed = JSON.parse(raw);

    if (!parsed || typeof parsed !== "object") {
      return null;
    }

    if (typeof parsed.ts !== "number" || !parsed.data) {
      return null;
    }

    if (Date.now() - parsed.ts > CACHE_TTL_MS) {
      localStorage.removeItem(key);
      return null;
    }

    return parsed;
  } catch { return null }
}

function getToolCacheKeys() {
  const keys = [];

  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);

    if (!key) {
      continue;
    }

    if (key.startsWith("osm_") || key.startsWith("debug_")) {
      keys.push(key);
    }
  }

  return keys;
}

function evictOldestToolCacheEntries(countToRemove) {
  const datedEntries = getToolCacheKeys()
    .map((key) => {
      const parsed = getCached(key);
      return {
        key,
        ts: parsed?.ts ?? 0,
      };
    })
    .sort((a, b) => a.ts - b.ts);

  for (let i = 0; i < Math.min(countToRemove, datedEntries.length); i += 1) {
    localStorage.removeItem(datedEntries[i].key);
  }
}

function setCached(key,data){
  const payload = JSON.stringify({
    ts: Date.now(),
    data
  });

  // localStorage is small (often around 5MB), so skip very large single items.
  if (payload.length > MAX_CACHE_ITEM_BYTES) {
    return false;
  }

  try {
    localStorage.setItem(key, payload);
    return true;
  } catch (error) {
    if (error && (error.name === "QuotaExceededError" || error.name === "NS_ERROR_DOM_QUOTA_REACHED")) {
      const toolCacheCount = getToolCacheKeys().length;
      evictOldestToolCacheEntries(Math.max(1, Math.ceil(toolCacheCount / 2)));

      try {
        localStorage.setItem(key, payload);
        return true;
      } catch {
        return false;
      }
    }

    return false;
  }
}

function clearCache(){
  const keysToDelete = [];

  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);

    if (!key) {
      continue;
    }

    if (key.startsWith("osm_") || key.startsWith("debug_")) {
      keysToDelete.push(key);
    }
  }

  keysToDelete.forEach((key) => localStorage.removeItem(key));
  location.reload();
}

// ---------- FETCH ----------
function fetchWithTimeout(url, options){
  return Promise.race([
    fetch(url, options),
    new Promise((_,reject)=>setTimeout(()=>reject(new Error("timeout")), TIMEOUT_MS))
  ]);
}

// ---------- GEO ----------
function rad(v){ return v*Math.PI/180 }

function dist(a,b){
  const R=6371000;
  const dLat=rad(b[1]-a[1]);
  const dLng=rad(b[0]-a[0]);

  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(rad(a[1])) *
    Math.cos(rad(b[1])) *
    Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function bearingDegrees(a, b){
  const lng1 = rad(a[0]);
  const lat1 = rad(a[1]);
  const lng2 = rad(b[0]);
  const lat2 = rad(b[1]);

  const y = Math.sin(lng2 - lng1) * Math.cos(lat2);
  const x =
    Math.cos(lat1) * Math.sin(lat2) -
    Math.sin(lat1) * Math.cos(lat2) * Math.cos(lng2 - lng1);

  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function angleDiffDegrees(a, b){
  const diff = Math.abs(a - b) % 360;
  return diff > 180 ? 360 - diff : diff;
}

function pointToSegmentDistance(point, start, end){
  const [lng, lat] = point;
  const [lng1, lat1] = start;
  const [lng2, lat2] = end;

  const x = lng;
  const y = lat;
  const x1 = lng1;
  const y1 = lat1;
  const x2 = lng2;
  const y2 = lat2;

  const dx = x2 - x1;
  const dy = y2 - y1;

  if (dx === 0 && dy === 0) {
    return dist(point, start);
  }

  const t = Math.max(
    0,
    Math.min(1, ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy))
  );

  const projected = [x1 + t * dx, y1 + t * dy];
  return dist(point, projected);
}

function closestWaySegmentToPoint(point, wayCoords){
  let best = {
    distance: Infinity,
    start: null,
    end: null,
  };

  for (let i = 0; i < wayCoords.length - 1; i += 1) {
    const start = wayCoords[i];
    const end = wayCoords[i + 1];
    const d = pointToSegmentDistance(point, start, end);

    if (d < best.distance) {
      best = { distance: d, start, end };
    }
  }

  return best;
}

function pointToPolylineDistance(point, wayCoords){
  return closestWaySegmentToPoint(point, wayCoords).distance;
}

function highwayPenalty(tags){
  const highway = (tags.highway || "").toLowerCase();
  return HIGHWAY_SCORE_PENALTY[highway] || 0;
}

function isWayWalkable(tags) {
  const highway = (tags.highway || "").toLowerCase();

  if (!highway) {
    return false;
  }

  const access = (tags.access || "").toLowerCase();
  const foot = (tags.foot || "").toLowerCase();

  if (foot === "no" || access === "no" || access === "private") {
    return false;
  }

  if (!WALKABLE_HIGHWAYS.has(highway)) {
    if (foot === "yes" || foot === "designated" || foot === "permissive") {
      return true;
    }

    return false;
  }

  return true;
}

function scoreWayForSegment(seg, way, previousWayId){
  if (!isWayWalkable(way.tags)) {
    return null;
  }

  const midpoint = [
    (seg[0][0] + seg[1][0]) / 2,
    (seg[0][1] + seg[1][1]) / 2,
  ];

  const midInfo = closestWaySegmentToPoint(midpoint, way.coords);

  if (!midInfo.start || !midInfo.end || midInfo.distance > SEARCH_BUFFER) {
    return null;
  }

  const startDistance = pointToPolylineDistance(seg[0], way.coords);
  const endDistance = pointToPolylineDistance(seg[1], way.coords);
  const endpointMax = Math.max(startDistance, endDistance);

  if (endpointMax > MAX_ENDPOINT_DISTANCE) {
    return null;
  }

  const routeBearing = bearingDegrees(seg[0], seg[1]);
  const wayBearing = bearingDegrees(midInfo.start, midInfo.end);
  const bearingDiff = angleDiffDegrees(routeBearing, wayBearing);

  if (bearingDiff > MAX_BEARING_DIFF_DEGREES) {
    return null;
  }

  const continuityBonus = previousWayId && previousWayId === way.id ? -14 : 0;

  const score =
    midInfo.distance +
    endpointMax * 0.55 +
    bearingDiff * 0.65 +
    highwayPenalty(way.tags) +
    continuityBonus;

  return { score };
}

// Midpoint-to-way distance using segment projection for better matching.
function segmentToWayDistance(seg,wayCoords){
  const mid = [
    (seg[0][0]+seg[1][0])/2,
    (seg[0][1]+seg[1][1])/2
  ];

  let best=Infinity;

  for(let i=0;i<wayCoords.length-1;i++){
    const d=pointToSegmentDistance(mid, wayCoords[i], wayCoords[i+1]);
    if(d<best) best=d;
  }

  return best;
}

// ---------- ROUTE ----------
function extractLines(g){
  const lines=[];
  const add=x=>{
    if(!x) return;
    if(x.type==="LineString") lines.push(x.coordinates);
    if(x.type==="MultiLineString") x.coordinates.forEach(l=>lines.push(l));
  };
  if(g.type==="FeatureCollection") g.features.forEach(f=>add(f.geometry));
  add(g);
  return lines;
}

function bbox(lines){
  const c=lines.flat();
  const pad = 0.004;

  return {
    w:Math.min(...c.map(c=>c[0])) - pad,
    e:Math.max(...c.map(c=>c[0])) + pad,
    s:Math.min(...c.map(c=>c[1])) - pad,
    n:Math.max(...c.map(c=>c[1])) + pad
  };
}

// ---------- CLASSIFY ----------
function classify(tags){
  const s=tags.surface?.toLowerCase();
  if(s){
    if(PAVED.has(s)) return "paved";
    if(UNPAVED.has(s)) return "unpaved";
  }
  return "unknown";
}

// ---------- OSM ----------
async function fetchOSM(b){
  const key = getCacheKey(b);
  const cached = getCached(key);
  if(cached){
    log("⚡ Using cached OSM");
    return cached.data;
  }

  const query = `
[out:json][timeout:45];
(way(${b.s},${b.w},${b.n},${b.e}););
out tags geom;`;

  for(const url of OVERPASS_ENDPOINTS){
    try{
      log("🌐 " + url);

      const res = await fetchWithTimeout(url,{
        method:"POST",
        body:"data="+encodeURIComponent(query)
      });

      if(!res.ok) continue;

      const data = await res.json();

      const ways = data.elements
        .filter(e=>e.geometry)
        .map(e=>({
          id:e.id,
          tags:e.tags || {},
          coords:e.geometry.map(p=>[p.lon,p.lat])
        }));

      if (!setCached(key, ways)) {
        log("⚠️ OSM response too large to cache, continuing without cache");
      }

      return ways;

    }catch(e){
      log("❌ " + e.message);
    }
  }

  throw new Error("All OSM endpoints failed");
}

// ---------- MAIN ----------
document.getElementById("run").onclick = async () => {
  out.textContent="";
  runButton.disabled = true;

  try {
    const f=document.getElementById("file").files[0];
    if(!f){
      log("Pick a file");
      return;
    }

    const geo=JSON.parse(await f.text());
    const lines=extractLines(geo);

    if (!lines.length) {
      throw new Error("No line geometry found in file.");
    }

    const debugKey=getDebugKey(lines);
    const cached=getCached(debugKey);

    if(cached){
      log("⚡ Using cached result");

      download("surface.geojson", cached.data.geojson);
      download("route-surface-summary.json", cached.data.summary);
      log(JSON.stringify(cached.data.summary,null,2));
      return;
    }

    const ways = await fetchOSM(bbox(lines));

    const features=[];
    let totals={paved:0,unpaved:0,unknown:0};

  // ✅ PER LINE SAFE LOOP
  for(const line of lines){
    let previousWayId = null;

    const classified=[];

    for(let i=0;i<line.length-1;i++){

      const seg=[line[i],line[i+1]];
      const len=dist(seg[0],seg[1]);

      let bestMatch=null;

      for(const w of ways){
        const scored = scoreWayForSegment(seg, w, previousWayId);

        if (!scored) {
          continue;
        }

        if (!bestMatch || scored.score < bestMatch.score) {
          bestMatch = {
            score: scored.score,
            way: w,
          };
        }
      }

      let type="unknown";

      if(bestMatch){
        type=classify(bestMatch.way.tags);
        previousWayId = bestMatch.way.id;
      } else {
        previousWayId = null;
      }

      totals[type]+=len;

      classified.push({
        type,
        coords:seg,
        length:len
      });
    }

    // ✅ SAFE SMOOTH (append only)
    const smoothed=[];

    for(const seg of classified){

      if(seg.length < MIN_SEGMENT_LENGTH && smoothed.length){

        const prev=smoothed[smoothed.length-1];

        const gap=dist(
          prev.coords[prev.coords.length-1],
          seg.coords[0]
        );

        if(gap < 30){
          prev.coords.push(seg.coords[1]);
          continue;
        }
      }

      smoothed.push({
        type:seg.type,
        coords:[...seg.coords]
      });
    }

    // ✅ SAFE MERGE
    const merged=[];
    let current=null;

    for(const seg of smoothed){

      if(!current){
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      const gap=dist(
        current.coords[current.coords.length-1],
        seg.coords[0]
      );

      // ✅ hard break prevents diagonal bug
      if(gap > 40){
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
        continue;
      }

      if(current.type === seg.type){
        current.coords.push(seg.coords[1]);
      } else {
        merged.push(current);
        current={type:seg.type,coords:[...seg.coords]};
      }
    }

    if(current) merged.push(current);

    // ✅ base route
    features.push({
      type:"Feature",
      properties:{stroke:COLORS.route,"stroke-width":4},
      geometry:{type:"LineString",coordinates:line}
    });

    // ✅ overlay
    for(const seg of merged){
      features.push({
        type:"Feature",
        properties:{
          stroke:COLORS[seg.type],
          "stroke-width":5
        },
        geometry:{
          type:"LineString",
          coordinates:seg.coords
        }
      });
    }
  }

    const totalLength = totals.paved + totals.unpaved + totals.unknown;

    const summary={
      pavedPercent: totalLength > 0
        ? Math.round((totals.paved / totalLength) * 100)
        : 0,
      unpavedPercent: totalLength > 0
        ? Math.round((totals.unpaved / totalLength) * 100)
        : 0,
      unknownPercent: totalLength > 0
        ? Math.round((totals.unknown / totalLength) * 100)
        : 0
    };

    log(JSON.stringify(summary,null,2));

    const final={
      summary,
      geojson:{
        type:"FeatureCollection",
        features
      }
    };

    if (!setCached(debugKey, final)) {
      log("⚠️ Result cache skipped due to storage limit");
    }

    download("surface.geojson", final.geojson);
    download("route-surface-summary.json", summary);
  } catch (error) {
    log("Error: " + (error?.message || String(error)));
  } finally {
    runButton.disabled = false;
  }
};

function download(name,data){
  const blob=new Blob([JSON.stringify(data,null,2)]);
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name;
  a.click();
}

</script>
</body>
</html>
